<!doctype html><html lang=zh><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>🤖 Claude Monitor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--bg2:#111122;--card:#14142a;--bdr:#1e1e40;
  --t1:#e0e0f0;--t2:#8888b0;--t3:#555578;
  --gr:#00c853;--rd:#ff1744;--or:#ff9100;--bl:#448aff;--ac:#7c5cfc;--cy:#00e5ff;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--t1)}
body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* Bar */
#bar{display:flex;align-items:center;justify-content:space-between;height:36px;padding:0 12px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0}
#bar .left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--ac)}
#bar .right{font-size:9px;color:var(--t3);display:flex;align-items:center;gap:10px}
#bar .right .stat-mini{font-size:9px;color:var(--t2)}
#bar .right .stat-mini b{color:var(--t1)}

/* Main */
main{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px;max-width:700px;margin:0 auto;width:100%}

/* Stat cards — horizontal row */
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.stk{background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:10px 8px;text-align:center}
.stk .sv{font-family:var(--mono);font-size:22px;font-weight:700}
.stk .sl{font-size:9px;color:var(--t2);margin-top:3px;letter-spacing:.5px}

/* Process chips — inline bar */
.proc-bar{display:flex;flex-wrap:wrap;gap:4px;padding:4px 6px;background:var(--card);border:1px solid var(--bdr);border-radius:6px}
.proc-chip{font-family:var(--mono);font-size:9px;color:var(--t2);padding:2px 6px;border-right:1px solid var(--bdr);white-space:nowrap}
.proc-chip:last-child{border-right:none}
.proc-chip .pi{color:var(--ac);font-weight:600}

/* Session card */
.ses{background:var(--card);border:1px solid var(--bdr);border-radius:6px;overflow:hidden;transition:border-color .2s}
.ses:hover{border-color:var(--ac)}
.ses .sh{cursor:pointer;display:flex;align-items:center;padding:8px 10px;font-size:10px;gap:8px;user-select:none}
.ses .sh .dot-alive{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--gr);box-shadow:0 0 4px var(--gr)}
.ses .sh .sid{font-family:var(--mono);color:var(--ac);font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis}
.ses .sh .meta{font-size:9px;color:var(--t3);flex:1;overflow:hidden;text-overflow:ellipsis}
.ses .sh .tok-inline{display:flex;gap:6px;font-size:9px;color:var(--t2);text-align:center;flex-shrink:0}
.ses .sh .tok-inline b{display:block;font-family:var(--mono);font-size:11px;color:var(--t1)}
.ses .sh .chev{color:var(--t3);font-size:9px;transition:transform .2s;flex-shrink:0}
.ses.open .sh .chev{transform:rotate(180deg)}

/* Detail */
.ses .sd{display:none;border-top:1px solid var(--bdr);padding:8px 12px 10px}
.ses.open .sd{display:block}
.ses .sd .dg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.ses .sd .dg .di{text-align:center}.di .dv{font-family:var(--mono);font-size:14px;font-weight:700}.di .dl{font-size:8px;color:var(--t3)}
.ses .sd .mflow{display:flex;flex-wrap:wrap;gap:6px}
.ses .sd .mchip{background:rgba(124,92,252,.08);border:1px solid var(--bdr);border-radius:4px;padding:4px 8px;font-size:9px}
.mchip .mc-name{color:var(--ac);font-weight:600;margin-bottom:2px}
.mchip .mc-stats{font-family:var(--mono);color:var(--t2);display:flex;gap:8px}
.mc-stats span{white-space:nowrap}
.ses .sd .cwd{font-size:9px;color:var(--t3);margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr)}

/* Footer */
#ft{display:flex;align-items:center;justify-content:space-between;height:20px;padding:0 12px;font-size:8px;color:var(--t3);background:var(--bg2);border-top:1px solid var(--bdr);flex-shrink:0}
</style></head><body>

<div id=bar>
  <div class=left>🤖 Claude Monitor</div>
  <div class=right>
    <span class=stat-mini>进程 <b id=hbProcs>0</b></span>
    <span class=stat-mini>会话 <b id=hbSess>0</b></span>
    <span class=stat-mini>输入 <b id=hbIn>0</b></span>
    <span class=stat-mini>输出 <b id=hbOut>0</b></span>
    <span style=font-size:9px;color:var(--t3) id=clk>--</span>
  </div>
</div>
<main id=mn>加载中...</main>
<div id=ft><span id=fu>--</span><span id=fs>--</span></div>

<script>
var ws, expanded={};

function conn(){
  ws=new WebSocket('ws://'+location.hostname+':9876');
  ws.onopen=function(){};
  ws.onclose=function(){setTimeout(conn,3000)};
  ws.onmessage=function(e){var m=JSON.parse(e.data);if(m.type==='full'||m.type==='update')render(m.data)};
}
conn();
setInterval(function(){
  if(ws&&ws.readyState===WebSocket.OPEN)return;
  fetch('/api/state').then(function(r){return r.json()}).then(render).catch(function(){});
},2000);

function toggle(id){
  expanded[id]=!expanded[id];
  var el=document.getElementById('ses-'+id);
  if(el)el.classList.toggle('open',expanded[id]);
}

function render(d){
  if(!d)return;
  var t=d.tokens||{},procs=d.procs||[];
  var allSess=d.sess||[];
  var sess=allSess.filter(function(s){return s.active});

  // Header bar stats
  document.getElementById('hbProcs').textContent=procs.length;
  document.getElementById('hbSess').textContent=sess.length;
  document.getElementById('hbIn').textContent=fmt(t.input);
  document.getElementById('hbOut').textContent=fmt(t.output);

  var html='';

  // Stat cards
  html+='<div class=stat-row>';
  html+='<div class=stk><div class=sv>'+procs.length+'</div><div class=sl>活跃进程</div></div>';
  html+='<div class=stk><div class=sv>'+sess.length+'</div><div class=sl>活跃会话</div></div>';
  html+='<div class=stk><div class=sv>'+fmt(t.input)+'</div><div class=sl>输入 Token</div></div>';
  html+='<div class=stk><div class=sv>'+fmt(t.output)+'</div><div class=sl>输出 Token</div></div>';
  html+='<div class=stk><div class=sv>'+fmt(t.cacheR)+'</div><div class=sl>缓存命中</div></div>';
  html+='</div>';

  // Process bar
  if(procs.length){
    html+='<div class=proc-bar>';
    procs.forEach(function(p){
      html+='<span class=proc-chip><span class=pi>PID '+p.Id+'</span> CPU '+(p.CPU||0).toFixed(0)+'s | '+p.Mem+' MB | '+p.UpM+'min | '+p.Threads+'线程</span>';
    });
    html+='</div>';
  }

  // Sessions
  if(sess.length===0){
    html+='<div style="color:var(--t3);font-size:10px;padding:20px;text-align:center">暂无活跃会话</div>';
  }else{
    sess.forEach(function(s,i){
      var tk=s.tokens||{},dur=fmdur(s.age);
      var models=tk.models?Object.entries(tk.models).sort(function(a,b){return b[1].input-a[1].input}):[];
      html+='<div class=ses id=ses-'+i+'>';
      html+='<div class=sh onclick="toggle('+i+')">';
      html+='<span class=dot-alive></span>';
      html+='<span class=sid>'+s.sid+'</span>';
      html+='<span class=meta>'+s.entry+' · v'+s.ver+'</span>';
      html+='<span class=tok-inline>';
      html+='<span><b>'+dur+'</b>运行</span>';
      html+='<span><b>'+fmt(tk.input||0)+'</b>输入</span>';
      html+='<span><b>'+fmt(tk.output||0)+'</b>输出</span>';
      html+='<span><b>'+fmt(tk.cacheR||0)+'</b>命中</span>';
      html+='</span>';
      html+='<span class=chev>▼</span>';
      html+='</div>';
      html+='<div class=sd>';
      html+='<div class=dg>';
      html+='<div class=di><div class=dv>'+dur+'</div><div class=dl>运行时长</div></div>';
      html+='<div class=di><div class=dv>'+fmt(tk.input||0)+'</div><div class=dl>输入 Token</div></div>';
      html+='<div class=di><div class=dv>'+fmt(tk.output||0)+'</div><div class=dl>输出 Token</div></div>';
      html+='<div class=di><div class=dv>'+fmt(tk.cacheR||0)+'</div><div class=dl>缓存命中</div></div>';
      html+='</div>';
      if(models.length){
        html+='<div class=mflow>';
        models.forEach(function(m){
          html+='<div class=mchip><div class=mc-name>'+m[0]+'</div><div class=mc-stats><span>in '+fmt(m[1].input)+'</span><span>out '+fmt(m[1].output)+'</span><span>W '+fmt(m[1].cacheW)+'</span><span>R '+fmt(m[1].cacheR)+'</span></div></div>';
        });
        html+='</div>';
      }
      html+='<div class=cwd>'+s.cwd+' · PID '+s.pid+' · '+s.kind+'</div>';
      html+='</div>';
      html+='</div>';
    });
  }

  document.getElementById('mn').innerHTML=html;

  // Restore expanded state
  Object.keys(expanded).forEach(function(id){
    if(expanded[id]){
      var el=document.getElementById('ses-'+id);
      if(el)el.classList.add('open');
    }
  });

  document.getElementById('fu').textContent='更新 '+new Date().toLocaleTimeString('zh-CN');
  document.getElementById('fs').textContent='🧠 '+(d.sys?.memUsed||'?')+'% / '+(d.sys?.memTotal||'?')+'GB · 缓存写 '+fmt(t.cacheW);
}

function fmt(n){if(!n)return'0';if(n>1e9)return(n/1e9).toFixed(1)+'B';if(n>1e6)return(n/1e6).toFixed(1)+'M';if(n>1e3)return(n/1e3).toFixed(0)+'K';return String(n)}
function fmdur(min){if(!min||min<0)return'--';var m=Math.round(min);if(m<60)return m+'分钟';if(m<1440)return Math.floor(m/60)+'时'+(m%60)+'分';return Math.floor(m/1440)+'天'+Math.floor(m%1440/60)+'时'}
setInterval(function(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('zh-CN')},1000);
</script></body></html>
