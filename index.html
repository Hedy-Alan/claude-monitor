<!doctype html><html lang=zh><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>🤖 Claude Monitor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;--bg2:#111122;--card:#14142a;--bdr:#1e1e40;
  --t1:#e0e0f0;--t2:#8888b0;--t3:#555578;
  --gr:#00c853;--rd:#ff1744;--or:#ff9100;--bl:#448aff;--ac:#7c5cfc;--cy:#00e5ff;
  --mono:'Cascadia Code','Fira Code','JetBrains Mono',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
  --r:8px;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--bg);color:var(--t1)}
body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* Top bar */
#bar{display:flex;align-items:center;justify-content:space-between;height:36px;padding:0 14px;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-shrink:0}
#bar .left{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--ac)}
.dot{width:7px;height:7px;border-radius:50%}.dot.ok{background:var(--gr)}.dot.warn{background:var(--or)}.dot.idle{background:var(--t3)}
#bar .right{font-size:10px;color:var(--t3)}

/* Main */
main{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* Stat cards row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.st{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center}
.st .sv{font-family:var(--mono);font-size:30px;font-weight:700}
.st .sl{font-size:10px;color:var(--t2);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.st .ss{font-size:9px;color:var(--t3);margin-top:2px}

/* Section */
.sec{margin-bottom:2px}.sec h3{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;padding:2px 0;margin-bottom:6px}

/* Session card */
.ses{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;transition:border-color .2s}.ses:hover{border-color:var(--ac)}
.ses .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ses .sh .sid{font-family:var(--mono);font-size:11px;color:var(--ac);font-weight:600}
.ses .sh .smeta{font-size:9px;color:var(--t3)}
.ses .sh .live{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ses .sh .live.alive{background:var(--gr);box-shadow:0 0 6px var(--gr)}
.ses .sh .live.dead{background:var(--t3)}
.ses .tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:6px}
.ses .tgrid .tg{text-align:center}
.ses .tgrid .tg .tv{font-family:var(--mono);font-size:16px;font-weight:700}
.ses .tgrid .tg .tl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.ses .models{font-size:9px;color:var(--t2);border-top:1px solid var(--bdr);padding-top:6px}
.ses .models span{color:var(--t1);margin:0 2px}

/* Footer */
#ft{display:flex;align-items:center;justify-content:space-between;height:22px;padding:0 14px;font-size:9px;color:var(--t3);background:var(--bg2);border-top:1px solid var(--bdr);flex-shrink:0}
</style></head><body>

<div id=bar>
  <div class=left><span>🤖 Claude Monitor</span><span class="dot ok" id=d></span></div>
  <div class=right><span id=clk>--</span> · 2s刷新</div>
</div>
<main id=mn>加载中...</main>
<div id=ft><span id=fu>--</span><span id=fs>--</span></div>

<script>
let ws;
function conn(){
  ws=new WebSocket(`ws://${location.hostname}:9876`);
  ws.onopen=()=>document.getElementById('d').className='dot ok';
  ws.onclose=()=>{document.getElementById('d').className='dot warn';setTimeout(conn,3000)};
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='full'||m.type==='update')render(m.data);
  };
}
conn();
// Fallback polling
setInterval(async()=>{
  if(ws&&ws.readyState===WebSocket.OPEN)return;
  try{const r=await fetch('/api/state');render(await r.json())}catch{}
},2000);

function render(d){
  if(!d)return;
  const dot=document.getElementById('d');
  if(d.procs.length>0)dot.className='dot ok';else dot.className='dot idle';

  const t=d.tokens||{};
  const sess=d.sess||[];
  const alive=sess.filter(s=>s.active).length;

  document.getElementById('mn').innerHTML=`
    <div class=stats>
      <div class=st><div class=sv>${d.procs.length}</div><div class=sl>Claude 进程</div><div class=ss>总CPU ${d.procs.reduce((s,p)=>s+(p.CPU||0),0).toFixed(0)}s</div></div>
      <div class=st><div class=sv>${sess.length}</div><div class=sl>会话</div><div class=ss>${alive} 活跃 · ${sess.length-alive} 已结束</div></div>
      <div class=st><div class=sv>${fmt(t.input)}</div><div class=sl>输入 Token</div></div>
      <div class=st><div class=sv>${fmt(t.output)}</div><div class=sl>输出 Token</div></div>
    </div>

    <div class=sec><h3>📋 会话详情</h3>
    ${sess.length===0?'<div style="color:var(--t3);font-size:10px;padding:20px;text-align:center">暂无会话</div>':
      sess.map(s=>{
        const tk=s.tokens||{};
        const dur=fmdur(s.age);
        const input=fmt(tk.input||0),output=fmt(tk.output||0);
        const cacheHits=tk.cacheR?fmt(tk.cacheR)+' (命中)' : '0';
        const models=tk.models?Object.entries(tk.models).sort((a,b)=>b[1].input-a[1].input):[];
        return `<div class=ses>
          <div class=sh>
            <div style=display:flex;align-items:center;gap:10px>
              <span class="live ${s.active?'alive':'dead'}"></span>
              <span class=sid>${s.sid}</span>
              <span class=smeta>PID ${s.pid||'?'} · ${s.kind} · ${s.entry} · v${s.ver}</span>
            </div>
            <span class=smeta>${dur}</span>
          </div>
          <div class=tgrid>
            <div class=tg><div class=tv>${dur}</div><div class=tl>运行时长</div></div>
            <div class=tg><div class=tv>${input}</div><div class=tl>输入 Token</div></div>
            <div class=tg><div class=tv>${output}</div><div class=tl>输出 Token</div></div>
            <div class=tg><div class=tv style=color:var(--or)>${cacheHits}</div><div class=tl>缓存命中</div></div>
          </div>
          ${models.length?`<div class=models>🧠 ${models.map(([m,v])=>\`<span>\${m}</span> \${fmt(v.input)}in/\${fmt(v.output)}out\`).join(' · ')}</div>`:''}
        </div>`;
      }).join('')
    }
    </div>

    <div class=sec><h3>🖥️ 进程详情</h3>
    ${d.procs.length===0?'<div style="color:var(--t3);font-size:10px;padding:10px;text-align:center">暂无进程</div>':
      `<div style=display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px>${
        d.procs.map(p=>`<div style="background:var(--card);border:1px solid var(--bdr);border-radius:6px;padding:6px 8px;font-family:var(--mono);font-size:10px"><b style=color:var(--ac)>PID ${p.Id}</b><br>CPU ${(p.CPU||0).toFixed(0)}s<br>内存 ${p.Mem||0} MB<br>${p.UpM||0}分钟 · ${p.Threads||0}线程</div>`).join('')
      }</div>`
    }
    </div>
  `;

  document.getElementById('fu').textContent='更新 '+new Date().toLocaleTimeString('zh-CN');
  document.getElementById('fs').textContent=`🧠 内存 ${d.sys?.memUsed||'?'}% / ${d.sys?.memTotal||'?'}GB`;
}

function fmt(n){if(!n)return'0';if(n>1e9)return(n/1e9).toFixed(1)+'B';if(n>1e6)return(n/1e6).toFixed(1)+'M';if(n>1e3)return(n/1e3).toFixed(0)+'K';return String(n)}
function fmdur(min){if(!min||min<0)return'--';const m=Math.round(min);if(m<60)return m+'分钟';if(m<1440)return Math.floor(m/60)+'时'+(m%60)+'分';return Math.floor(m/1440)+'天'+Math.floor(m%1440/60)+'时'}

setInterval(()=>document.getElementById('clk').textContent=new Date().toLocaleTimeString('zh-CN'),1000);
</script></body></html>
